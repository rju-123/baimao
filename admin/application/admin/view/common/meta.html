<meta charset="utf-8">
<title>{$title|default=''}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="renderer" content="webkit">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow">

<link rel="shortcut icon" href="__CDN__/assets/img/favicon.ico" />
<!-- Loading Bootstrap & backend styles -->
<link href="__CDN__/assets/css/backend{$Think.config.app_debug?'':'.min'}.css?v={$Think.config.site.version|htmlentities}" rel="stylesheet">
<!-- 独立引入 Font Awesome，避免跨域导致图标不显示 -->
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

{if $Think.config.fastadmin.adminskin}
<link href="__CDN__/assets/css/skins/{$Think.config.fastadmin.adminskin|htmlentities}.css?v={$Think.config.site.version|htmlentities}" rel="stylesheet">
{/if}

<script type="text/javascript">
    var require = {
        // 将模板输出包进字符串，避免编辑器把模板语法当 JS 报错
        config: JSON.parse('{$config|json_encode}')
    };
    // 自定义：提供 NestJS API 基础地址，供后台 JS 预览小程序上传的图片等使用
    require.config = require.config || {};
    require.config.site = require.config.site || {};
    require.config.site.api_base_url = require.config.site.api_base_url
        || JSON.parse('{$Think.config.site.api_base_url|default=""|json_encode}');
</script>
