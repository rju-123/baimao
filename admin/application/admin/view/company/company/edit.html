<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <input type="hidden" name="row[id]" value="{$row.id|htmlentities}">
    <div class="form-group">
        <label for="c-name" class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-name" data-rule="required" class="form-control" name="row[name]" type="text" value="{$row.name|htmlentities}" placeholder="公司名称">
        </div>
    </div>
    <div class="form-group">
        <label for="c-credit_code" class="control-label col-xs-12 col-sm-2">{:__('Credit code')}:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-credit_code" data-rule="required" class="form-control" name="row[credit_code]" type="text" value="{$row.credit_code|htmlentities}" placeholder="统一社会信用代码">
        </div>
    </div>
    <div class="form-group">
        <label for="c-address" class="control-label col-xs-12 col-sm-2">{:__('Address')}:</label>
        <div class="col-xs-12 col-sm-6">
            <input id="c-address" class="form-control" name="row[address]" type="text" value="{$row.address|htmlentities}" placeholder="公司地址">
        </div>
    </div>
    <div class="form-group">
        <label for="c-contact_name" class="control-label col-xs-12 col-sm-2">{:__('Contact name')}:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-contact_name" class="form-control" name="row[contact_name]" type="text" value="{$row.contact_name|htmlentities}" placeholder="联系人姓名">
        </div>
    </div>
    <div class="form-group">
        <label for="c-contact_phone" class="control-label col-xs-12 col-sm-2">{:__('Contact phone')}:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-contact_phone" class="form-control" name="row[contact_phone]" type="text" value="{$row.contact_phone|htmlentities}" placeholder="联系人电话">
        </div>
    </div>
    <div class="form-group">
        <label for="c-bank_name" class="control-label col-xs-12 col-sm-2">开户银行:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-bank_name" class="form-control" name="row[bank_name]" type="text" value="{$row.bank_name|default=''|htmlentities}" placeholder="开户银行">
        </div>
    </div>
    <div class="form-group">
        <label for="c-bank_account" class="control-label col-xs-12 col-sm-2">银行账号:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-bank_account" class="form-control" name="row[bank_account]" type="text" value="{$row.bank_account|default=''|htmlentities}" placeholder="银行账号">
        </div>
    </div>
    <div class="form-group">
        <label for="c-invoice_image_path" class="control-label col-xs-12 col-sm-2">开票资料图片:</label>
        <div class="col-xs-12 col-sm-6">
            <div class="input-group">
                <input id="c-invoice_image_path" class="form-control" name="row[invoice_image_path]" type="text" value="{$row.invoice_image_path|default=''|htmlentities}" placeholder="开票资料图片路径">
                <div class="input-group-addon no-border no-padding">
                    <span class="btn btn-danger plupload" data-input-id="c-invoice_image_path" data-mimetype="image/gif,image/jpeg,image/png,image/jpg" data-multiple="false"><i class="fa fa-upload"></i> {:__('Upload')}</span>
                </div>
                <span class="msg-box n-right" for="c-invoice_image_path"></span>
            </div>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
