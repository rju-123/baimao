<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <input type="hidden" name="row[id]" value="{$row.id|htmlentities}">
    <div class="form-group">
        <label for="c-code" class="control-label col-xs-12 col-sm-2">优惠券编号:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-code" class="form-control" name="row[code]" type="text" value="{$row.code|htmlentities}" readonly>
        </div>
    </div>
    <div class="form-group">
        <label for="c-name" class="control-label col-xs-12 col-sm-2">优惠券名称:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-name" data-rule="required" class="form-control" name="row[name]" type="text" value="{$row.name|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label for="c-type" class="control-label col-xs-12 col-sm-2">优惠类型:</label>
        <div class="col-xs-12 col-sm-4">
            <select id="c-type" class="form-control" name="row[type]">
                <option value="amount" {eq name="row.type" value="amount"}selected{/eq}>满减</option>
                <option value="discount" {eq name="row.type" value="discount"}selected{/eq}>折扣</option>
                <option value="direct" {eq name="row.type" value="direct"}selected{/eq}>直减</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label for="c-value" class="control-label col-xs-12 col-sm-2">优惠金额/折扣:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-value" data-rule="required;number" class="form-control" name="row[value]" type="text" value="{$row.value|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label for="c-minAmount" class="control-label col-xs-12 col-sm-2">使用门槛:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-minAmount" data-rule="required;number" class="form-control" name="row[minAmount]" type="text" value="{$row.minAmount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label for="c-validFrom" class="control-label col-xs-12 col-sm-2">有效期开始:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-validFrom" data-rule="required" class="form-control" name="row[validFrom]" type="datetime-local" value="{:str_replace(' ', 'T', substr($row['validFrom'], 0, 16))}">
        </div>
    </div>
    <div class="form-group">
        <label for="c-validTo" class="control-label col-xs-12 col-sm-2">有效期结束:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-validTo" data-rule="required" class="form-control" name="row[validTo]" type="datetime-local" value="{:str_replace(' ', 'T', substr($row['validTo'], 0, 16))}">
        </div>
    </div>
    <div class="form-group">
        <label for="c-totalQuantity" class="control-label col-xs-12 col-sm-2">计划发放总量:</label>
        <div class="col-xs-12 col-sm-4">
            <input id="c-totalQuantity" data-rule="required;integer" class="form-control" name="row[totalQuantity]" type="number" value="{$row.totalQuantity|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label for="c-status" class="control-label col-xs-12 col-sm-2">状态:</label>
        <div class="col-xs-12 col-sm-4">
            <select id="c-status" class="form-control" name="row[status]">
                <option value="not_started" {eq name="row.status" value="not_started"}selected{/eq}>未开始</option>
                <option value="in_progress" {eq name="row.status" value="in_progress"}selected{/eq}>进行中</option>
                <option value="ended" {eq name="row.status" value="ended"}selected{/eq}>已结束</option>
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">确定</button>
            <button type="reset" class="btn btn-default btn-embossed">重置</button>
        </div>
    </div>
</form>
