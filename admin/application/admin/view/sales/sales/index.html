<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh,edit')}
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('sales/sales/edit')}"
                           width="100%">
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    require.config({
        paths: {
            'backend/sales/sales': '/assets/js/backend/sales/sales'
        }
    });
    require(['backend', 'table', 'form', 'backend/sales/sales'], function (Backend, Table, Form, Controller) {
        if (Controller && typeof Controller.index === 'function') {
            Controller.index();
        }
    });
</script>
