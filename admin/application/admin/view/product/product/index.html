<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh,add,edit,del')}
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('product/product/edit')}"
                           data-operate-del="{:$auth->check('product/product/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script type="text/javascript">
    // 覆盖产品模块的 RequireJS 路径到本地，避免从 CDN 加载 404
    require.config({
        paths: {
            // 模块 ID -> 本地 JS 路径（去掉 .js 后缀）
            'backend/product/product': '/assets/js/backend/product/product'
        }
    });

    // 兜底初始化，确保产品列表页表格正常渲染
    require(['backend', 'table', 'form', 'backend/product/product'], function (Backend, Table, Form, Controller) {
        if (Controller && typeof Controller.index === 'function') {
            Controller.index();
        }
    });
</script>
